# GoReleaser configuration for Planck
# https://goreleaser.com

version: 2

project_name: planck

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: planck
    main: ./cmd/planck
    binary: planck
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildTime={{.Date}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - docs/**/*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug Fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Performance
      regexp: "^.*perf[(\\w)]*:+.*$"
      order: 2
    - title: Other
      order: 999

brews:
  - name: planck
    repository:
      owner: anthropics
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/anthropics/planck"
    description: "Terminal UI for iteratively refining plans with AI"
    license: MIT
    dependencies:
      - name: tmux
        type: optional
    test: |
      system "#{bin}/planck", "--version"
    install: |
      bin.install "planck"

release:
  github:
    owner: anthropics
    name: planck
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

announce:
  skip: true
